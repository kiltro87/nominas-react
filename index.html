<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/nominas-react/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nominas</title>
    <script>
      // Receives the redirect from 404.html and restores the original URL
      // so the React router sees the correct path instead of /?p=/...
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        var search = location.search;
        if (search) {
          var p = new URLSearchParams(search);
          var path = p.get('p');
          if (path) {
            var query = p.get('q') ? '?' + p.get('q').replace(/~and~/g, '&') : '';
            history.replaceState(
              null,
              null,
              location.pathname.split('/').slice(0, 2).join('/') +
                '/' +
                path.replace(/~and~/g, '&') +
                query +
                location.hash
            );
          }
        }
      })();
    </script>
    <script type="module" crossorigin src="/nominas-react/assets/index-Bmrkebfp.js"></script>
    <link rel="stylesheet" crossorigin href="/nominas-react/assets/index-DqgIYhQV.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
